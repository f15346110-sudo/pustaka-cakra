<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Pustaka Cakra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <i class="fa-solid fa-book-open"></i>
                <span>Pustaka Cakra</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Beranda</a>
                <a href="katalog.html" class="nav-link">Katalog</a>
                <div id="navAuth"></div>
            </div>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
        <div class="auth-card" data-reveal>
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h2>Buat Akun Baru</h2>
                <p>Daftar untuk mulai meminjam buku</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="regName" placeholder="Masukkan nama lengkap" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="nama@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" onclick="sfx.click()">
                    <i class="fa-solid fa-user-plus"></i> Daftar
                </button>
            </form>
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="login.html" onclick="sfx.click()">Masuk di sini</a></p>
            </div>
        </div>
    </section>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
